# WifiWhirl ESPHome example (S100101 / P05326, 6‑pin)
# Work in progress – intended target is a custom ESPHome external component.

esphome:
  name: wifiwhirl
  friendly_name: WifiWhirl

esp8266:
  board: nodemcuv2

# Keep logging conservative; the pump/display MITM is timing sensitive.
logger:
  level: WARN

api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  # For first tests, clone this repo locally next to your ESPHome YAML and
  # point to the `esphome/components` folder.
  - source:
      type: local
      path: ./WifiWhirl-Software/esphome/components

wifiwhirl:
  id: spa
  # S100101 / P05326 behaves like MIAMI2021 in the upstream codebase.
  model: miami2021

  # Default NodeMCU v3 (ESP8266) pin set used by WifiWhirl when hwcfg.json is present.
  # Adjust these if your PCB/wiring differs.
  cio_data_pin: D1
  cio_clk_pin: D2
  cio_cs_pin: D3
  dsp_data_pin: D4
  dsp_clk_pin: D5
  dsp_cs_pin: D6
  dsp_audio_pin: D7

climate:
  - platform: wifiwhirl
    wifiwhirl_id: spa
    name: "Whirlpool"

switch:
  - platform: wifiwhirl
    wifiwhirl_id: spa
    power:
      name: "Whirlpool Power"
    lock:
      name: "Tastensperre"
    pump:
      name: "Filter/Pumpe"
    heater:
      name: "Heizung"
    bubbles:
      name: "Bubbles"
    jets:
      name: "HydroJets"

number:
  - platform: wifiwhirl
    wifiwhirl_id: spa
    target_temperature:
      name: "Zieltemperatur"
      min_value: 20
      max_value: 40
      step: 1

sensor:
  - platform: wifiwhirl
    wifiwhirl_id: spa
    temperature:
      name: "Wassertemperatur"
    target_temperature:
      name: "Zieltemperatur (Sensor)"
    error_code:
      name: "Fehlercode"
