# WifiWhirl ESPHome example (S100101 / P05326, 6‑pin)
# Work in progress – intended target is a custom ESPHome external component.

esphome:
  name: wifiwhirl
  friendly_name: WifiWhirl

esp8266:
  board: nodemcuv2

# Keep logging conservative; the pump/display MITM is timing sensitive.
logger:
  level: WARN

api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

